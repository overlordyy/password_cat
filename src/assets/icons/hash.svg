<!-- 哈希：# 符号+散列块 16x16 像素风 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <rect x="0" y="0" width="16" height="16" fill="#0f1a0f"/>
  <!-- # 符号 -->
  <rect x="4" y="3" width="1" height="8" fill="#40ff80"/>
  <rect x="7" y="3" width="1" height="8" fill="#40ff80"/>
  <rect x="3" y="5" width="6" height="1" fill="#40ff80"/>
  <rect x="3" y="8" width="6" height="1" fill="#40ff80"/>
  <!-- 散列输出块（右侧） -->
  <rect x="10" y="2" width="5" height="1" fill="#20c050" opacity="0.9"/>
  <rect x="10" y="4" width="4" height="1" fill="#20c050" opacity="0.8"/>
  <rect x="10" y="6" width="5" height="1" fill="#20c050" opacity="0.9"/>
  <rect x="10" y="8" width="3" height="1" fill="#20c050" opacity="0.7"/>
  <rect x="10" y="10" width="5" height="1" fill="#20c050" opacity="0.9"/>
  <rect x="10" y="12" width="4" height="1" fill="#20c050" opacity="0.8"/>
  <!-- 箭头 -->
  <rect x="9" y="7" width="1" height="1" fill="#ffffff"/>
  <!-- MD5 SHA 文字暗示 -->
  <rect x="1" y="13" width="9" height="1" fill="#1a4a2a" opacity="0.8"/>
  <rect x="1" y="14" width="7" height="1" fill="#1a4a2a" opacity="0.6"/>
</svg>
