<!-- 密码：钥匙 16x16 像素风 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- 钥匙圆头 -->
  <rect x="2" y="2" width="2" height="1" fill="#f0c040"/>
  <rect x="1" y="3" width="4" height="3" fill="#f0c040"/>
  <rect x="2" y="6" width="2" height="1" fill="#f0c040"/>
  <!-- 钥匙孔 -->
  <rect x="2" y="4" width="1" height="1" fill="#3a2000"/>
  <!-- 钥匙柄 -->
  <rect x="5" y="4" width="8" height="2" fill="#f0c040"/>
  <!-- 钥匙齿 -->
  <rect x="9"  y="6" width="2" height="2" fill="#f0c040"/>
  <rect x="12" y="6" width="1" height="2" fill="#f0c040"/>
  <!-- 描边/阴影 -->
  <rect x="2" y="2" width="2" height="1" fill="#c88808" opacity="0.5"/>
</svg>
