<!-- 文本对比：两页面+箭头 16x16 像素风 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- 左文档 -->
  <rect x="1" y="1" width="5" height="7" fill="#e0e8f0"/>
  <rect x="1" y="1" width="5" height="1" fill="#a0b8d0"/>
  <rect x="2" y="3" width="3" height="1" fill="#4080c0"/>
  <rect x="2" y="5" width="2" height="1" fill="#c04040"/>
  <rect x="2" y="7" width="3" height="1" fill="#4080c0"/>
  <!-- 右文档 -->
  <rect x="10" y="1" width="5" height="7" fill="#e0e8f0"/>
  <rect x="10" y="1" width="5" height="1" fill="#a0b8d0"/>
  <rect x="11" y="3" width="3" height="1" fill="#4080c0"/>
  <rect x="11" y="5" width="3" height="1" fill="#40a040"/>
  <rect x="11" y="7" width="2" height="1" fill="#4080c0"/>
  <!-- 中间双向箭头 -->
  <rect x="7" y="4" width="2" height="1" fill="#ffffff"/>
  <rect x="6" y="4" width="1" height="1" fill="#ffffff"/>
  <rect x="9" y="4" width="1" height="1" fill="#ffffff"/>
  <rect x="7" y="3" width="1" height="1" fill="#ffffff"/>
  <rect x="8" y="3" width="1" height="1" fill="#ffffff"/>
  <rect x="6" y="5" width="1" height="1" fill="#ffffff"/>
  <rect x="9" y="5" width="1" height="1" fill="#ffffff"/>
  <!-- 底部标签 -->
  <rect x="1" y="10" width="14" height="4" fill="#2a4a7a"/>
  <rect x="2" y="11" width="5" height="1" fill="#ff6060"/>
  <rect x="9" y="11" width="5" height="1" fill="#60ff90"/>
  <rect x="2" y="12" width="3" height="1" fill="#ff9090" opacity="0.7"/>
  <rect x="9" y="12" width="4" height="1" fill="#90ffb0" opacity="0.7"/>
</svg>
