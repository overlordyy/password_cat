<!-- 服务器：显示器+主机 16x16 像素风 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- 显示器边框 -->
  <rect x="1" y="1" width="10" height="8" fill="#4a9eff"/>
  <!-- 显示器屏幕 -->
  <rect x="2" y="2" width="8" height="6" fill="#0a2a4a"/>
  <!-- 屏幕内容线条 -->
  <rect x="3" y="3" width="5" height="1" fill="#00ff88" opacity="0.8"/>
  <rect x="3" y="5" width="3" height="1" fill="#00ff88" opacity="0.6"/>
  <rect x="3" y="7" width="4" height="1" fill="#00ff88" opacity="0.4"/>
  <!-- 支架 -->
  <rect x="5" y="9" width="2" height="2" fill="#6080a0"/>
  <rect x="4" y="11" width="4" height="1" fill="#6080a0"/>
  <!-- 主机箱 -->
  <rect x="12" y="2" width="3" height="9" fill="#5570a0"/>
  <rect x="12" y="3" width="3" height="1" fill="#88aacc"/>
  <rect x="13" y="5" width="1" height="1" fill="#00ff88"/>
  <rect x="13" y="7" width="1" height="1" fill="#4af"/>
</svg>
