<!-- SQL格式化：数据库圆柱+查询 16x16 像素风 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- 数据库圆柱体 -->
  <rect x="3" y="3" width="8" height="1" fill="#60b8e0"/>
  <rect x="2" y="4" width="10" height="1" fill="#80d0f0"/><!-- 顶面高光 -->
  <rect x="2" y="5" width="10" height="5" fill="#4090c0"/><!-- 柱身 -->
  <rect x="2" y="6" width="10" height="1" fill="#60b8e0" opacity="0.5"/><!-- 横纹 -->
  <rect x="2" y="8" width="10" height="1" fill="#60b8e0" opacity="0.5"/><!-- 横纹 -->
  <rect x="3" y="10" width="8" height="1" fill="#60b8e0"/>
  <rect x="2" y="11" width="10" height="1" fill="#4090c0"/>
  <rect x="3" y="12" width="8" height="1" fill="#2a6090"/>
  <!-- SELECT 文字暗示 -->
  <rect x="3" y="5" width="4" height="1" fill="#ffffff" opacity="0.7"/>
  <rect x="3" y="8" width="3" height="1" fill="#ffffff" opacity="0.5"/>
  <!-- 查询箭头 -->
  <rect x="13" y="7" width="2" height="1" fill="#f0e040"/>
  <rect x="14" y="6" width="1" height="1" fill="#f0e040"/>
  <rect x="14" y="8" width="1" height="1" fill="#f0e040"/>
  <!-- 底部行 -->
  <rect x="3" y="14" width="10" height="1" fill="#2060a0" opacity="0.5"/>
</svg>
