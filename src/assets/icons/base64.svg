<!-- Base64：字母B64+转换箭头 16x16 像素风 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <rect x="0" y="0" width="16" height="16" fill="#1a1a2e"/>
  <!-- B -->
  <rect x="1" y="2" width="1" height="6" fill="#a0c8ff"/>
  <rect x="2" y="2" width="3" height="1" fill="#a0c8ff"/>
  <rect x="5" y="3" width="1" height="2" fill="#a0c8ff"/>
  <rect x="2" y="4" width="3" height="1" fill="#a0c8ff"/>
  <rect x="5" y="5" width="1" height="2" fill="#a0c8ff"/>
  <rect x="2" y="7" width="3" height="1" fill="#a0c8ff"/>
  <!-- 6 -->
  <rect x="7" y="2" width="3" height="1" fill="#80ffb0"/>
  <rect x="7" y="3" width="1" height="5" fill="#80ffb0"/>
  <rect x="8" y="5" width="2" height="1" fill="#80ffb0"/>
  <rect x="10" y="6" width="1" height="1" fill="#80ffb0"/>
  <rect x="8" y="7" width="2" height="1" fill="#80ffb0"/>
  <!-- 4 -->
  <rect x="12" y="2" width="1" height="3" fill="#ffb060"/>
  <rect x="13" y="4" width="2" height="1" fill="#ffb060"/>
  <rect x="14" y="2" width="1" height="5" fill="#ffb060"/>
  <!-- 转换符号 -->
  <rect x="2"  y="10" width="5" height="1" fill="#6080a0"/>
  <rect x="9"  y="10" width="5" height="1" fill="#6080a0"/>
  <rect x="7"  y="9"  width="2" height="3" fill="#ffffff"/>
  <rect x="6"  y="10" width="1" height="1" fill="#ffffff"/>
  <rect x="9"  y="10" width="1" height="1" fill="#ffffff"/>
  <!-- 底部文字暗示 -->
  <rect x="1"  y="13" width="6" height="1" fill="#4060a0" opacity="0.8"/>
  <rect x="9"  y="13" width="6" height="1" fill="#204040" opacity="0.8"/>
</svg>
