<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="512" height="512" shape-rendering="crispEdges">
  <!-- 像素画，每格 1x1，通过 rect 绘制 -->
  <!-- 调色板：
    bg     = #5b3fa0  背景紫
    fur1   = #f0ece4  最浅毛（脸/胸/脚趾）
    fur2   = #d8d0c4  浅灰毛
    fur3   = #b8aea0  中灰毛
    fur4   = #8c847a  深灰毛（爪/暗部）
    eye    = #3cc8b0  蓝绿眼睛
    eyeD   = #1a6858  眼睛深色
    pupil  = #0a2820  瞳孔
    eyeW   = #ffffff  眼白/高光
    nose   = #e87890  粉鼻
    mouth  = #c06070  嘴
    inner  = #f0b0b8  耳内粉
    lock1  = #ffe050  金锁浅
    lock2  = #c88808  金锁深
    lockH  = #4a2800  锁孔
    chain  = #e8c030  链条
  -->

  <!-- 背景 -->
  <rect width="32" height="32" fill="#5b3fa0"/>

  <!-- ===== 左耳 ===== -->
  <rect x="6" y="2" width="1" height="1" fill="#b8aea0"/>
  <rect x="7" y="1" width="1" height="1" fill="#b8aea0"/>
  <rect x="7" y="2" width="2" height="1" fill="#d8d0c4"/>
  <rect x="8" y="1" width="1" height="1" fill="#d8d0c4"/>
  <rect x="8" y="0" width="1" height="1" fill="#d8d0c4"/>
  <rect x="7" y="3" width="2" height="1" fill="#f0ece4"/>
  <rect x="8" y="2" width="1" height="1" fill="#f0b0b8"/><!-- 耳内 -->

  <!-- ===== 右耳 ===== -->
  <rect x="24" y="2" width="1" height="1" fill="#b8aea0"/>
  <rect x="23" y="1" width="1" height="1" fill="#b8aea0"/>
  <rect x="22" y="2" width="2" height="1" fill="#d8d0c4"/>
  <rect x="23" y="1" width="1" height="1" fill="#d8d0c4"/>
  <rect x="23" y="0" width="1" height="1" fill="#d8d0c4"/>
  <rect x="22" y="3" width="2" height="1" fill="#f0ece4"/>
  <rect x="23" y="2" width="1" height="1" fill="#f0b0b8"/><!-- 耳内 -->

  <!-- ===== 头部 row 2-3 ===== -->
  <rect x="9" y="2" width="13" height="1" fill="#d8d0c4"/>
  <rect x="8" y="3" width="16" height="1" fill="#d8d0c4"/>

  <!-- ===== 头部 row 4-5（额头，蓬松毛） ===== -->
  <rect x="7" y="4" width="18" height="1" fill="#d8d0c4"/>
  <rect x="9" y="4" width="14" height="1" fill="#f0ece4"/>
  <rect x="7" y="5" width="18" height="1" fill="#f0ece4"/>

  <!-- ===== 头部 row 6-7 ===== -->
  <rect x="6" y="6" width="20" height="1" fill="#f0ece4"/>
  <rect x="6" y="7" width="20" height="1" fill="#f0ece4"/>

  <!-- ===== 眼睛行 row 8-10 ===== -->
  <!-- row 8 -->
  <rect x="6" y="8" width="20" height="1" fill="#f0ece4"/>
  <!-- 左眼框上 -->
  <rect x="8" y="8" width="5" height="1" fill="#d8d0c4"/>
  <!-- 右眼框上 -->
  <rect x="19" y="8" width="5" height="1" fill="#d8d0c4"/>

  <!-- row 9 - 眼睛 -->
  <rect x="6" y="9" width="20" height="1" fill="#f0ece4"/>
  <!-- 左眼 -->
  <rect x="8"  y="9" width="1" height="1" fill="#d8d0c4"/>
  <rect x="9"  y="9" width="1" height="1" fill="#ffffff"/><!-- 眼白 -->
  <rect x="10" y="9" width="1" height="1" fill="#3cc8b0"/><!-- 眼色 -->
  <rect x="11" y="9" width="1" height="1" fill="#3cc8b0"/>
  <rect x="12" y="9" width="1" height="1" fill="#1a6858"/>
  <rect x="13" y="9" width="1" height="1" fill="#d8d0c4"/>
  <!-- 右眼 -->
  <rect x="18" y="9" width="1" height="1" fill="#d8d0c4"/>
  <rect x="19" y="9" width="1" height="1" fill="#1a6858"/>
  <rect x="20" y="9" width="1" height="1" fill="#3cc8b0"/>
  <rect x="21" y="9" width="1" height="1" fill="#3cc8b0"/>
  <rect x="22" y="9" width="1" height="1" fill="#ffffff"/><!-- 眼白 -->
  <rect x="23" y="9" width="1" height="1" fill="#d8d0c4"/>

  <!-- row 10 - 眼睛主体 -->
  <rect x="6" y="10" width="20" height="1" fill="#f0ece4"/>
  <!-- 左眼 -->
  <rect x="8"  y="10" width="1" height="1" fill="#d8d0c4"/>
  <rect x="9"  y="10" width="1" height="1" fill="#3cc8b0"/>
  <rect x="10" y="10" width="1" height="1" fill="#0a2820"/><!-- 瞳孔 -->
  <rect x="11" y="10" width="1" height="1" fill="#0a2820"/>
  <rect x="12" y="10" width="1" height="1" fill="#1a6858"/>
  <rect x="13" y="10" width="1" height="1" fill="#d8d0c4"/>
  <!-- 右眼 -->
  <rect x="18" y="10" width="1" height="1" fill="#d8d0c4"/>
  <rect x="19" y="10" width="1" height="1" fill="#1a6858"/>
  <rect x="20" y="10" width="1" height="1" fill="#0a2820"/><!-- 瞳孔 -->
  <rect x="21" y="10" width="1" height="1" fill="#0a2820"/>
  <rect x="22" y="10" width="1" height="1" fill="#3cc8b0"/>
  <rect x="23" y="10" width="1" height="1" fill="#d8d0c4"/>
  <!-- 眼睛高光 -->
  <rect x="9"  y="9"  width="1" height="1" fill="#ffffff"/>
  <rect x="22" y="9"  width="1" height="1" fill="#ffffff"/>

  <!-- row 11 - 眼睛下 -->
  <rect x="6" y="11" width="20" height="1" fill="#f0ece4"/>
  <rect x="8"  y="11" width="6" height="1" fill="#d8d0c4"/>
  <rect x="18" y="11" width="6" height="1" fill="#d8d0c4"/>

  <!-- ===== 鼻子区 row 12-13 ===== -->
  <rect x="6" y="12" width="20" height="1" fill="#f0ece4"/>
  <!-- 鼻子 -->
  <rect x="15" y="12" width="2" height="1" fill="#e87890"/>
  <rect x="14" y="13" width="4" height="1" fill="#e87890"/>
  <!-- 鼻梁胡须分隔 -->
  <rect x="13" y="12" width="1" height="1" fill="#d8d0c4"/>
  <rect x="18" y="12" width="1" height="1" fill="#d8d0c4"/>

  <!-- row 13 -->
  <rect x="6" y="13" width="20" height="1" fill="#f0ece4"/>
  <rect x="14" y="13" width="4" height="1" fill="#e87890"/>

  <!-- ===== 嘴巴 / 胡须 row 14 ===== -->
  <rect x="6" y="14" width="20" height="1" fill="#f0ece4"/>
  <!-- 嘴 -->
  <rect x="14" y="14" width="1" height="1" fill="#c06070"/>
  <rect x="17" y="14" width="1" height="1" fill="#c06070"/>
  <rect x="15" y="15" width="2" height="1" fill="#c06070"/>
  <!-- 胡须 -->
  <rect x="3"  y="13" width="5" height="1" fill="#e0dcd0"/>
  <rect x="4"  y="14" width="5" height="1" fill="#e0dcd0"/>
  <rect x="3"  y="15" width="5" height="1" fill="#e0dcd0"/>
  <rect x="24" y="13" width="5" height="1" fill="#e0dcd0"/>
  <rect x="23" y="14" width="5" height="1" fill="#e0dcd0"/>
  <rect x="24" y="15" width="5" height="1" fill="#e0dcd0"/>

  <!-- ===== 脸颊/下颌 row 15-16 ===== -->
  <rect x="6" y="15" width="20" height="1" fill="#f0ece4"/>
  <rect x="6" y="16" width="20" height="1" fill="#f0ece4"/>
  <!-- 脸颊毛蓬松 -->
  <rect x="5" y="14" width="2" height="3" fill="#d8d0c4"/>
  <rect x="25" y="14" width="2" height="3" fill="#d8d0c4"/>

  <!-- ===== 项链 row 17 ===== -->
  <rect x="6"  y="17" width="20" height="1" fill="#d8d0c4"/><!-- 脖颈 -->
  <!-- 链条 -->
  <rect x="8"  y="17" width="1" height="1" fill="#e8c030"/>
  <rect x="10" y="17" width="1" height="1" fill="#e8c030"/>
  <rect x="12" y="17" width="1" height="1" fill="#ffe050"/>
  <rect x="14" y="17" width="1" height="1" fill="#ffe050"/>
  <rect x="16" y="17" width="1" height="1" fill="#ffe050"/>
  <rect x="18" y="17" width="1" height="1" fill="#ffe050"/>
  <rect x="20" y="17" width="1" height="1" fill="#e8c030"/>
  <rect x="22" y="17" width="1" height="1" fill="#e8c030"/>

  <!-- ===== 身体 row 18-27 ===== -->
  <!-- row 18 -->
  <rect x="5" y="18" width="22" height="1" fill="#d8d0c4"/>
  <rect x="6" y="18" width="20" height="1" fill="#f0ece4"/>

  <!-- 左爪 伸出 row 18-22 -->
  <rect x="3" y="18" width="3" height="1" fill="#b8aea0"/>
  <rect x="2" y="19" width="4" height="1" fill="#d8d0c4"/>
  <rect x="2" y="20" width="4" height="1" fill="#d8d0c4"/>
  <rect x="2" y="21" width="1" height="1" fill="#b8aea0"/>
  <rect x="3" y="21" width="1" height="1" fill="#f0ece4"/>
  <rect x="4" y="21" width="1" height="1" fill="#b8aea0"/>
  <rect x="2" y="22" width="1" height="1" fill="#8c847a"/><!-- 爪趾 -->
  <rect x="3" y="22" width="1" height="1" fill="#8c847a"/>
  <rect x="4" y="22" width="1" height="1" fill="#8c847a"/>
  <rect x="5" y="22" width="1" height="1" fill="#8c847a"/>

  <!-- 右爪 伸出（举高一格）row 17-21 -->
  <rect x="26" y="17" width="3" height="1" fill="#b8aea0"/>
  <rect x="26" y="18" width="4" height="1" fill="#d8d0c4"/>
  <rect x="26" y="19" width="4" height="1" fill="#d8d0c4"/>
  <rect x="26" y="20" width="1" height="1" fill="#b8aea0"/>
  <rect x="27" y="20" width="1" height="1" fill="#f0ece4"/>
  <rect x="28" y="20" width="1" height="1" fill="#b8aea0"/>
  <rect x="26" y="21" width="1" height="1" fill="#8c847a"/><!-- 爪趾 -->
  <rect x="27" y="21" width="1" height="1" fill="#8c847a"/>
  <rect x="28" y="21" width="1" height="1" fill="#8c847a"/>
  <rect x="29" y="21" width="1" height="1" fill="#8c847a"/>

  <!-- 身体主体 row 19-26 -->
  <rect x="5" y="19" width="22" height="1" fill="#f0ece4"/>
  <rect x="5" y="20" width="22" height="1" fill="#f0ece4"/>
  <rect x="5" y="21" width="22" height="1" fill="#f0ece4"/>
  <rect x="5" y="22" width="22" height="1" fill="#f0ece4"/>
  <rect x="5" y="23" width="22" height="1" fill="#f0ece4"/>
  <rect x="6" y="24" width="20" height="1" fill="#f0ece4"/>
  <rect x="7" y="25" width="18" height="1" fill="#d8d0c4"/>
  <rect x="8" y="26" width="16" height="1" fill="#d8d0c4"/>
  <rect x="9" y="27" width="14" height="1" fill="#b8aea0"/>

  <!-- 胸口白毛 -->
  <rect x="11" y="19" width="10" height="1" fill="#ffffff"/>
  <rect x="10" y="20" width="12" height="1" fill="#ffffff"/>
  <rect x="10" y="21" width="12" height="1" fill="#f8f8f6"/>
  <rect x="11" y="22" width="10" height="1" fill="#f8f8f6"/>
  <rect x="12" y="23" width="8"  height="1" fill="#f0ece4"/>

  <!-- 身体两侧暗部 -->
  <rect x="5"  y="19" width="2" height="6" fill="#b8aea0"/>
  <rect x="25" y="19" width="2" height="6" fill="#b8aea0"/>

  <!-- ===== 密码锁吊坠 row 18-22 ===== -->
  <!-- 锁扣 -->
  <rect x="15" y="18" width="1" height="1" fill="#ffe050"/>
  <rect x="16" y="18" width="1" height="1" fill="#ffe050"/>
  <rect x="14" y="19" width="1" height="1" fill="#c88808"/>
  <rect x="17" y="19" width="1" height="1" fill="#c88808"/>
  <!-- 锁体 -->
  <rect x="13" y="20" width="6" height="1" fill="#ffe050"/>
  <rect x="13" y="21" width="6" height="1" fill="#e8c030"/>
  <rect x="13" y="22" width="6" height="1" fill="#c88808"/>
  <!-- 锁孔 -->
  <rect x="15" y="21" width="2" height="1" fill="#4a2800"/>
  <rect x="16" y="22" width="1" height="1" fill="#4a2800"/>
  <!-- 锁体高光 -->
  <rect x="13" y="20" width="2" height="1" fill="#fff0a0"/>
</svg>
